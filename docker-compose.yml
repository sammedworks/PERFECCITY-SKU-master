version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/perfeccity123
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - ./cypher:/cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "perfeccity123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      PERFECCITY_NEO4J_URI: bolt://neo4j:7687
      PERFECCITY_NEO4J_USER: neo4j
      PERFECCITY_NEO4J_PASSWORD: perfeccity123
      PERFECCITY_CORS_ORIGINS: '["*"]'
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
